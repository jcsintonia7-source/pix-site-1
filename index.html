<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Depósito PIX</title>

<style>

body{
    margin:0;
    background:#090b14;
    font-family:Arial,sans-serif;
    color:#fff;
}

.container{
    max-width:500px;
    margin:30px auto;
    padding:20px;
}

.card{
    background:#111420;
    border-radius:12px;
    padding:20px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    box-sizing:border-box;
    padding:14px;
    margin-bottom:12px;
    border:none;
    border-radius:8px;
    background:#1b2030;
    color:#fff;
}

.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-bottom:15px;
}

.valor-btn{
    padding:14px;
    border:none;
    border-radius:8px;
    background:#1b2030;
    color:#fff;
    cursor:pointer;
}

.depositar{
    width:100%;
    padding:16px;
    border:none;
    border-radius:8px;
    background:#c3003b;
    color:#fff;
    font-size:18px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h2>Depósito PIX</h2>

<input id="valor" placeholder="Valor do depósito">

<div class="grid">
<button class="valor-btn">R$30</button>
<button class="valor-btn">R$50</button>
<button class="valor-btn">R$100</button>
<button class="valor-btn">R$250</button>
<button class="valor-btn">R$500</button>
<button class="valor-btn">R$1000</button>
</div>

<input id="nome" placeholder="Nome completo">
<input id="email" placeholder="E-mail">
<input id="telefone" placeholder="Telefone">
<input id="cpf" placeholder="CPF">

<button class="depositar">
GERAR PIX
</button>

</div>

</div>

</body>
</html>
