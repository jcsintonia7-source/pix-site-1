<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Depósito PIX</title>

<style>
body{
    background:#090b14;
    font-family:Arial,sans-serif;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
}

.box{
    width:420px;
    background:#111420;
    padding:20px;
    border-radius:12px;
}

h2{
    margin:0 0 20px;
}

.valor{
    width:100%;
    padding:15px;
    border:none;
    border-radius:8px;
    background:#2a2d36;
    color:#fff;
    margin-bottom:15px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

.btn-valor{
    background:#161922;
    border:1px solid #2d3140;
    color:#ff0048;
    padding:15px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.depositar{
    width:100%;
    margin-top:20px;
    padding:15px;
    background:#5d0821;
    border:none;
    border-radius:8px;
    color:#fff;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="box">

<h2>Depositar</h2>

<input
class="valor"
id="valor"
placeholder="Valor">

<div class="grid">
<button class="btn-valor" onclick="setValor(30)">R$ 30</button>
<button class="btn-valor" onclick="setValor(50)">R$ 50</button>
<button class="btn-valor" onclick="setValor(100)">R$ 100</button>
<button class="btn-valor" onclick="setValor(250)">R$ 250</button>
<button class="btn-valor" onclick="setValor(500)">R$ 500</button>
<button class="btn-valor" onclick="setValor(1000)">R$ 1.000</button>
</div>

<button
class="depositar"
onclick="gerarPix()">
DEPOSITAR
</button>

</div>

<script>

function setValor(v){
  document.getElementById('valor').value=v;
}

async function gerarPix(){

  alert(
    "Frontend criado. Agora precisamos integrar a API pela Function da Netlify."
  );

}

</script>

</body>
</html>
